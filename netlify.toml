[build]
  publish = "."

[build.environment]
  # SUPABASE_URL is a public project URL (like a domain), intentionally
  # embedded in the browser HTML for the cnf_state sync. It is not a secret.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# /demo serves the main app, which detects the path and switches to demo mode.
[[redirects]]
  from = "/demo"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/demo/*"
  to = "/index.html"
  status = 200
